<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cole</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f5f7;
      --card:      #ffffff;
      --blue:      #0071e3;
      --blue-hover:#0077ed;
      --text:      #1d1d1f;
      --sub:       #6e6e73;
      --muted:     #a1a1a6;
      --border:    #d2d2d7;
      --green:     #34c759;
      --red:       #ff3b30;
      --yellow:    #ff9f0a;
      --cyan:      #32ade6;
      --shadow:    0 2px 20px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
      --radius:    18px;
      --radius-sm: 12px;
      --radius-pill: 980px;
    }

    body {
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 20px 100px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── FADE IN ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .main {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      animation: fadeUp 0.45s ease both;
    }

    /* ── LOGOUT ── */
    .logout-bar {
      position: fixed;
      top: 16px;
      right: 20px;
      z-index: 50;
    }

    .logout-link {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      transition: color 150ms ease;
    }

    .logout-link:hover { color: var(--sub); }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 8px;
    }

    .logo {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1;
      margin-bottom: 10px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 15px;
      color: var(--sub);
      letter-spacing: 0;
    }

    .tagline {
      margin-top: 12px;
      font-size: 17px;
      color: var(--sub);
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 2px rgba(52, 199, 89, 0.25);
      animation: pulse 2.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 2px rgba(52, 199, 89, 0.25); }
      50%       { opacity: 0.6; box-shadow: 0 0 0 4px rgba(52, 199, 89, 0.1); }
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── UPLOAD FEEDBACK ── */
    .upload-feedback {
      display: none;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 24px;
    }

    .upload-feedback.visible { display: block; }

    .upload-feedback-title {
      font-size: 15px;
      font-weight: 600;
      color: #1c7a3b;
      margin-bottom: 2px;
    }

    .upload-feedback-sub {
      font-size: 14px;
      color: var(--sub);
    }

    /* ── DROPZONE ── */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 60px 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 200ms ease, background 200ms ease;
      background: var(--card);
      position: relative;
    }

    .dropzone:hover, .dropzone.over {
      border-color: var(--blue);
      background: #f0f7ff;
    }

    .dropzone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 40px;
      margin-bottom: 16px;
      display: block;
      pointer-events: none;
    }

    .drop-title {
      font-size: 19px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      pointer-events: none;
      letter-spacing: -0.2px;
    }

    .drop-sub {
      font-size: 14px;
      color: var(--sub);
      pointer-events: none;
      line-height: 1.5;
    }

    .drop-sub .accent { color: var(--blue); font-weight: 500; }

    .drop-micro {
      margin-top: 12px;
      font-size: 12px;
      color: #86868b;
      pointer-events: none;
    }

    .file-name {
      margin-top: 16px;
      font-size: 14px;
      color: #1c7a3b;
      font-weight: 500;
      pointer-events: none;
    }

    /* ── TABLE ── */
    .table-wrap {
      display: none;
      overflow-x: auto;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      background: var(--card);
    }

    .table-wrap.visible { display: block; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead th {
      background: #fafafa;
      padding: 12px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      border-bottom: 1px solid #f0f0f0;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid #f5f5f7;
      transition: background 150ms ease;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }

    tbody td {
      padding: 14px 20px;
      vertical-align: middle;
    }

    .td-name  { font-weight: 500; color: var(--text); }
    .td-phone { color: var(--sub); font-size: 13px; font-variant-numeric: tabular-nums; }
    .td-monto { font-variant-numeric: tabular-nums; font-weight: 500; }

    /* ── BADGES ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 11px;
      border-radius: var(--radius-pill);
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
    }

    .badge-pending  { background: #f5f5f7; color: var(--muted); }
    .badge-calling  { background: #fff4e0; color: #a05c00; animation: flash 1.1s ease-in-out infinite; }
    .badge-ptp      { background: #edfaf2; color: #1c7a3b; }
    .badge-noanswer { background: #fff0f0; color: #c0392b; }
    .badge-scheduled{ background: #eaf4fb; color: #1a6fa8; }
    .badge-error        { background: #fff0f0; color: #c0392b; }
    .badge-error-retry  { background: #fff8ee; color: #a05c00; animation: flash 1.4s ease-in-out infinite; }

    @keyframes flash {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    /* ── SPINNER ── */
    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner {
      display: inline-block;
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    /* ── STOP BUTTON ── */
    .btn-stop {
      display: none;
      width: 100%;
      max-width: 400px;
      padding: 14px 32px;
      background: none;
      color: #c0392b;
      border: 1.5px solid #c0392b;
      border-radius: var(--radius-pill);
      font-size: 15px;
      font-weight: 590;
      font-family: inherit;
      cursor: pointer;
      transition: all 200ms ease;
    }

    .btn-stop.visible { display: block; }
    .btn-stop:hover { background: #fff0f0; }

    /* ── CTA ── */
    .cta-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .btn-main {
      width: 100%;
      max-width: 400px;
      padding: 16px 32px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius-pill);
      font-size: 17px;
      font-weight: 590;
      font-family: inherit;
      cursor: pointer;
      transition: all 200ms ease;
      letter-spacing: -0.1px;
    }

    .btn-main:hover:not(:disabled) {
      background: var(--blue-hover);
      transform: scale(1.01);
      box-shadow: 0 4px 24px rgba(0,113,227,0.3);
    }

    .btn-main:active:not(:disabled) { transform: scale(0.99); }

    .btn-main:disabled {
      background: #c7c7cc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .progress-bar-wrap {
      width: 100%;
      max-width: 400px;
      height: 3px;
      background: #e5e5ea;
      border-radius: 99px;
      overflow: hidden;
      display: none;
    }

    .progress-bar-wrap.visible { display: block; }

    .progress-bar {
      height: 100%;
      background: var(--blue);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .progress-text {
      font-size: 13px;
      color: var(--sub);
      text-align: center;
      min-height: 18px;
    }

    /* ── SUMMARY ── */
    .summary {
      display: none;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .summary.visible { display: block; }

    .summary-title {
      font-size: 19px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.2px;
      margin-bottom: 20px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .summary-stat {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 16px 18px;
    }

    .summary-stat .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 6px;
    }

    .summary-stat .value {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1;
    }

    .value-total    { color: var(--text); }
    .value-ok       { color: #1c7a3b; }
    .value-ptp      { color: #1c7a3b; }
    .value-error    { color: #c0392b; }

    .retry-note {
      font-size: 13px;
      color: #a05c00;
      background: #fff8ee;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
    }

    .sheets-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      color: var(--blue);
      text-decoration: none;
      font-weight: 500;
      transition: color 150ms ease;
    }

    .sheets-link:hover { color: var(--blue-hover); text-decoration: underline; }

    /* ── SOLO LINK ── */
    .solo-link {
      font-size: 15px;
      color: var(--blue);
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      font-weight: 500;
      text-decoration: none;
      transition: color 150ms ease;
    }

    .solo-link:hover { color: var(--blue-hover); text-decoration: underline; }

    /* ── MODAL ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 36px;
      width: 100%;
      max-width: 420px;
      animation: fadeUp 0.3s ease both;
    }

    .modal h2 {
      font-size: 21px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
      margin-bottom: 24px;
    }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 7px;
    }

    input[type="text"],
    input[type="tel"],
    input[type="number"] {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg);
      border: none;
      border-radius: 10px;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: box-shadow 150ms ease;
    }

    input:focus { box-shadow: 0 0 0 3px rgba(0,113,227,0.25); }
    input::placeholder { color: #c7c7cc; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-cancel {
      flex: 1;
      padding: 13px;
      background: var(--bg);
      border: none;
      border-radius: var(--radius-pill);
      color: var(--sub);
      font-size: 15px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 150ms ease;
    }

    .btn-cancel:hover { background: #e8e8ed; }

    .btn-call {
      flex: 2;
      padding: 13px;
      background: var(--blue);
      border: none;
      border-radius: var(--radius-pill);
      color: #fff;
      font-size: 15px;
      font-weight: 590;
      font-family: inherit;
      cursor: pointer;
      transition: all 200ms ease;
    }

    .btn-call:hover:not(:disabled) { background: var(--blue-hover); }
    .btn-call:disabled { opacity: 0.4; cursor: not-allowed; }

    .modal-status {
      margin-top: 14px;
      font-size: 14px;
      min-height: 20px;
      text-align: center;
    }

    .modal-status.ok  { color: #1c7a3b; }
    .modal-status.err { color: #c0392b; }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      body { padding: 40px 16px 80px; }
      .logo { font-size: 40px; }
      .dropzone { padding: 44px 24px; }
      .btn-main { font-size: 16px; }
      .summary-grid { grid-template-columns: 1fr 1fr; }
      .modal { padding: 28px 24px; }
    }
  </style>
</head>
<body>

  <div class="logout-bar">
    <a class="logout-link" href="/auth/logout">Cerrar sesión</a>
  </div>

  <div class="main">

    <!-- HEADER -->
    <header>
      <div class="logo">Cole</div>
      <div class="status-pill"><span class="dot"></span> Sistema activo</div>
      <p class="tagline">Cargá una cartera, iniciá una campaña y seguí los resultados.</p>
    </header>

    <!-- UPLOAD FEEDBACK -->
    <div class="upload-feedback" id="uploadFeedback"></div>

    <!-- DROPZONE -->
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" />
      <span class="drop-icon">📂</span>
      <div class="drop-title">Subí tu cartera</div>
      <div class="drop-sub">Arrastrá un archivo .csv con columnas:<br>
        <span class="accent">nombre · telefono · monto · dias_mora</span>
      </div>
      <div class="drop-micro">Recomendado: probá primero con 10–20 deudores.</div>
      <div class="file-name" id="fileName"></div>
    </div>

    <!-- TABLE -->
    <div class="table-wrap" id="tableWrap">
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Teléfono</th>
            <th>Monto</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- SUMMARY -->
    <div class="summary" id="summary"></div>

    <!-- CTA -->
    <div class="cta-wrap">
      <button class="btn-main" id="btnCampaign" disabled>Iniciar campaña</button>
      <button class="btn-stop" id="btnStop">⏹ Detener campaña</button>
      <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText"></div>
      <button class="solo-link" id="soloLink">Hacer una llamada individual →</button>
    </div>

  </div>

  <!-- MODAL: LLAMADA INDIVIDUAL -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h2>Llamada individual</h2>
      <div class="field">
        <label>Nombre completo</label>
        <input type="text" id="mName" placeholder="Juan García" />
      </div>
      <div class="field">
        <label>Teléfono</label>
        <input type="tel" id="mPhone" placeholder="+5491112345678" />
      </div>
      <div class="field">
        <label>Monto adeudado ($)</label>
        <input type="number" id="mAmount" placeholder="50000" min="1" />
      </div>
      <div class="field">
        <label>Días de mora</label>
        <input type="number" id="mDays" placeholder="30" min="1" />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btnModalClose">Cancelar</button>
        <button class="btn-call" id="btnModalCall">Llamar</button>
      </div>
      <div class="modal-status" id="modalStatus"></div>
    </div>
  </div>

  <script>
  (() => {
    'use strict';

    const SHEETS_URL = 'https://docs.google.com/spreadsheets/d/15kL4w4-Qj2j0ZeApuoroe_aHk9NsBrQIL1JYYLIiRTc';

    const dropzone       = document.getElementById('dropzone');
    const fileInput      = document.getElementById('fileInput');
    const fileName       = document.getElementById('fileName');
    const uploadFeedback = document.getElementById('uploadFeedback');
    const tableWrap      = document.getElementById('tableWrap');
    const tableBody      = document.getElementById('tableBody');
    const btnCampaign    = document.getElementById('btnCampaign');
    const btnStop        = document.getElementById('btnStop');
    const progressWrap   = document.getElementById('progressWrap');
    const progressBar    = document.getElementById('progressBar');
    const progressText   = document.getElementById('progressText');
    const summaryEl      = document.getElementById('summary');
    const soloLink       = document.getElementById('soloLink');
    const modalBackdrop  = document.getElementById('modalBackdrop');
    const btnModalClose  = document.getElementById('btnModalClose');
    const btnModalCall   = document.getElementById('btnModalCall');
    const modalStatus    = document.getElementById('modalStatus');

    let debtors    = [];
    let running    = false;
    let pollTimer  = null;
    let idToDebtor = {}; // queue id → debtor object

    // ── Drag & drop ──
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('over');
      const f = e.dataTransfer.files[0];
      if (f) handleFile(f);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

    function handleFile(file) {
      fileName.textContent = '📄 ' + file.name;
      const ext = file.name.split('.').pop().toLowerCase();
      if (ext === 'csv') {
        const reader = new FileReader();
        reader.onload = e => parseCSV(e.target.result);
        reader.readAsText(file, 'UTF-8');
      } else if (ext === 'xlsx' || ext === 'xls') {
        fileName.textContent += ' — convertí a .csv para continuar';
      } else {
        fileName.textContent = 'Formato no soportado';
      }
    }

    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length < 2) return;

      const headers = lines[0].split(/[,;]/).map(h => h.trim().toLowerCase().replace(/\s+/g, '_'));
      const idx = {
        nombre:    headers.findIndex(h => h.includes('nombre')),
        telefono:  headers.findIndex(h => h.includes('tel') || h.includes('phone')),
        monto:     headers.findIndex(h => h.includes('monto') || h.includes('amount')),
        dias_mora: headers.findIndex(h => h.includes('dia') || h.includes('mora') || h.includes('day')),
      };

      debtors = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(/[,;]/).map(c => c.trim().replace(/^"|"$/g, ''));
        if (cols.length < 2) continue;
        const name     = idx.nombre    >= 0 ? cols[idx.nombre]   : '';
        const phone    = idx.telefono  >= 0 ? cols[idx.telefono] : '';
        const amount   = idx.monto     >= 0 ? Number(cols[idx.monto].replace(/[^0-9.]/g, '')) || 0 : 0;
        const days     = idx.dias_mora >= 0 ? Number(cols[idx.dias_mora]) || 0 : 0;
        if (!name && !phone) continue;
        debtors.push({ name, phone, amount, daysOverdue: days, status: 'pending' });
      }

      renderTable(true);
      showUploadFeedback();
      updateCTA();
    }

    function showUploadFeedback() {
      const n = debtors.length;
      uploadFeedback.innerHTML = `
        <div class="upload-feedback-title">Archivo cargado</div>
        <div class="upload-feedback-sub">${n} deudor${n !== 1 ? 'es' : ''} listo${n !== 1 ? 's' : ''} para llamar</div>
      `;
      uploadFeedback.classList.add('visible');
    }

    // ── Table ──
    function renderTable(previewOnly = false) {
      tableBody.innerHTML = '';
      const list = previewOnly ? debtors.slice(0, 3) : debtors;

      list.forEach(d => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="td-name">${esc(d.name)}</td>
          <td class="td-phone">${esc(d.phone)}</td>
          <td class="td-monto">${d.amount ? '$' + d.amount.toLocaleString('es-AR') : '—'}</td>
          <td class="td-status">${badge('pending')}</td>
        `;
        d.rowEl = tr;
        tableBody.appendChild(tr);
      });

      if (previewOnly && debtors.length > 3) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td colspan="4" style="text-align:center;color:var(--muted);font-size:13px;padding:12px">… y ${debtors.length - 3} deudores más</td>`;
        tableBody.appendChild(tr);
      }

      tableWrap.classList.add('visible');
      summaryEl.classList.remove('visible');
    }

    function expandTable() {
      tableBody.innerHTML = '';
      debtors.forEach(d => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="td-name">${esc(d.name)}</td>
          <td class="td-phone">${esc(d.phone)}</td>
          <td class="td-monto">${d.amount ? '$' + d.amount.toLocaleString('es-AR') : '—'}</td>
          <td class="td-status">${badge('pending')}</td>
        `;
        d.rowEl = tr;
        tableBody.appendChild(tr);
      });
    }

    function setStatus(debtor, status, note) {
      debtor.status = status;
      const td = debtor.rowEl?.querySelector('.td-status');
      if (td) td.innerHTML = badge(status, note);
    }

    function badge(status, note) {
      const map = {
        pending:      ['badge-pending',      '⏳ Pendiente'],
        calling:      ['badge-calling',      '📞 Llamando'],
        ptp:          ['badge-ptp',          '✅ Prometió pagar'],
        noanswer:     ['badge-noanswer',     '❌ No atendió'],
        scheduled:    ['badge-scheduled',    '📅 Agendó'],
        error:        ['badge-error',        '❌ Error técnico'],
        'error-retry':['badge-error-retry',  '❌ Error técnico — reintentando'],
      };
      const [cls, label] = map[status] || map.pending;
      return `<span class="badge ${cls}">${label}${note ? ' · ' + esc(note) : ''}</span>`;
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function updateCTA() {
      if (running) return;
      const n = debtors.length;
      btnCampaign.disabled = n === 0;
      btnCampaign.textContent = n > 0 ? `Iniciar campaña — ${n} deudores` : 'Iniciar campaña';
      progressText.textContent = '';
    }

    // ── Campaign — queue-based ──
    btnCampaign.addEventListener('click', async () => {
      if (running || debtors.length === 0) return;

      running = true;
      summaryEl.classList.remove('visible');
      btnCampaign.disabled = true;
      btnCampaign.innerHTML = `<span class="spinner"></span>Encolando llamadas…`;
      btnStop.classList.add('visible');
      progressWrap.classList.add('visible');
      expandTable();

      // Assign stable IDs and map them
      idToDebtor = {};
      const payload = debtors.map(d => {
        const id = crypto.randomUUID();
        d._queueId = id;
        idToDebtor[id] = d;
        return { id, name: d.name, phone: d.phone, amount: d.amount, daysOverdue: d.daysOverdue };
      });

      try {
        const res  = await fetch('/api/queue/batch', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ debtors: payload }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
      } catch (err) {
        btnCampaign.textContent = 'Error al iniciar campaña';
        progressText.textContent = err.message;
        running = false;
        btnStop.classList.remove('visible');
        return;
      }

      btnCampaign.innerHTML = `<span class="spinner"></span>Llamando…`;
      startPolling();
    });

    // ── Stop button ──
    btnStop.addEventListener('click', async () => {
      await fetch('/api/queue/clear', { method: 'POST' });
      stopPolling();
      btnStop.classList.remove('visible');
      btnCampaign.textContent = '⏹ Campaña detenida';
      progressText.textContent = '';
      running = false;
    });

    // ── Polling ──
    function startPolling() {
      stopPolling(); // clear any previous
      pollTimer = setInterval(pollStatus, 3000);
      pollStatus(); // immediate first tick
    }

    function stopPolling() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }

    async function pollStatus() {
      let status;
      try {
        const res = await fetch('/api/queue/status');
        status = await res.json();
      } catch { return; }

      const { pending, calling, done, error, cancelled, total, items } = status;

      // Update per-row badges
      (items || []).forEach(item => {
        const debtor = idToDebtor[item.id];
        if (!debtor) return;
        const s = item.status;
        if      (s === 'calling')   setStatus(debtor, 'calling');
        else if (s === 'done')      setStatus(debtor, 'calling'); // call initiated, outcome TBD
        else if (s === 'error')     setStatus(debtor, 'error-retry', item.error);
        else if (s === 'cancelled') setStatus(debtor, 'error', 'Cancelado');
        // 'pending' stays as badge-pending (no change needed)
      });

      // Progress bar
      const finished = done + error + (cancelled || 0);
      progressBar.style.width = total > 0 ? `${(finished / total) * 100}%` : '0%';

      const active = pending + calling;
      if (active > 0) {
        btnCampaign.innerHTML = `<span class="spinner"></span>Llamando — ${finished} de ${total}`;
        progressText.textContent = `${pending} pendiente${pending !== 1 ? 's' : ''} · ${calling} en curso`;
      }

      // Done when nothing is pending or calling
      if (active === 0 && running) {
        stopPolling();
        btnStop.classList.remove('visible');
        btnCampaign.textContent = '✅ Campaña completada';
        progressText.textContent = '';
        running = false;
        showSummary(total, done, error);
      }
    }

    async function showSummary(total, initiated, errors) {
      let pendingRetries = 0;
      try {
        const rr = await fetch('/api/retries');
        const rd = await rr.json();
        pendingRetries = rd.pending || 0;
      } catch (_) {}

      summaryEl.innerHTML = `
        <div class="summary-title">Resultados</div>
        <div class="summary-grid">
          <div class="summary-stat">
            <div class="label">Total llamadas</div>
            <div class="value value-total">${total}</div>
          </div>
          <div class="summary-stat">
            <div class="label">Iniciadas</div>
            <div class="value value-ok">${initiated}</div>
          </div>
          <div class="summary-stat">
            <div class="label">Promesas de pago</div>
            <div class="value value-ptp">—</div>
          </div>
          <div class="summary-stat">
            <div class="label">Errores</div>
            <div class="value value-error">${errors}</div>
          </div>
        </div>
        ${pendingRetries > 0 ? `<div class="retry-note">🔄 Reintentos programados: ${pendingRetries} — en 2 horas</div>` : ''}
        <a class="sheets-link" href="${SHEETS_URL}" target="_blank" rel="noopener">Ver detalle en Google Sheets →</a>
      `;
      summaryEl.classList.add('visible');
      summaryEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── Modal ──
    soloLink.addEventListener('click', () => modalBackdrop.classList.add('open'));
    btnModalClose.addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', e => { if (e.target === modalBackdrop) closeModal(); });

    function closeModal() {
      modalBackdrop.classList.remove('open');
      modalStatus.textContent = '';
      modalStatus.className = 'modal-status';
    }

    btnModalCall.addEventListener('click', async () => {
      const name   = document.getElementById('mName').value.trim();
      const phone  = document.getElementById('mPhone').value.trim();
      const amount = Number(document.getElementById('mAmount').value);
      const days   = Number(document.getElementById('mDays').value);

      if (!name || !phone) {
        modalStatus.className = 'modal-status err';
        modalStatus.textContent = 'Completá nombre y teléfono.';
        return;
      }

      btnModalCall.disabled = true;
      btnModalCall.textContent = 'Llamando…';
      modalStatus.textContent = '';
      modalStatus.className = 'modal-status';

      try {
        const res = await fetch('/api/calls/outbound', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ to: phone, debtor: { name, amount, daysOverdue: days } }),
        });
        const data = await res.json();
        if (res.ok) {
          modalStatus.className = 'modal-status ok';
          modalStatus.textContent = `Llamada iniciada · ${data.callSid || ''}`;
        } else {
          throw new Error(data.error || `HTTP ${res.status}`);
        }
      } catch (err) {
        modalStatus.className = 'modal-status err';
        modalStatus.textContent = err.message;
      } finally {
        btnModalCall.disabled = false;
        btnModalCall.textContent = 'Llamar';
      }
    });

  })();
  </script>

</body>
</html>
